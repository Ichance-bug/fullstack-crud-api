<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Departments</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="adminDashboard.html">← Admin Dashboard</a>
    </div>
  </nav>

  <main class="container my-4">
    <h2 class="mb-3">Departments</h2>
    <div id="departments-table"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API   = 'http://localhost:3000/api';
    const token = sessionStorage.getItem('auth_token');
    const user  = JSON.parse(sessionStorage.getItem('auth_user') || 'null');
    if (!user || user.role !== 'admin') window.location.href = 'login.html';

    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

    async function loadDepartments() {
      const res   = await fetch(`${API}/departments`, { headers });
      const depts = await res.json();

      const rows = depts.length
        ? depts.map(d => `<tr><td>${d.id}</td><td>${d.name}</td><td>${d.description}</td></tr>`).join('')
        : '<tr><td colspan="3" class="text-center text-muted">No departments.</td></tr>';

      document.getElementById('departments-table').innerHTML = `
        <table class="table table-bordered table-hover">
          <thead class="table-dark"><tr><th>ID</th><th>Name</th><th>Description</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    loadDepartments();
  </script>
</body>
</html>
