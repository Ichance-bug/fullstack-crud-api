<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employees</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="adminDashboard.html">← Admin Dashboard</a>
    </div>
  </nav>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Employees</h2>
      <button class="btn btn-primary" id="add-employee-btn">+ Add Employee</button>
    </div>

    <div id="employees-table"></div>

    <div id="employee-form-container" class="card mt-4 d-none">
      <div class="card-body">
        <h5 id="form-title">Add Employee</h5>
        <form id="employee-form">
          <input type="hidden" id="emp-edit-id" />
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Employee ID</label>
              <input type="text" class="form-control" id="emp-id" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">User Email</label>
              <input type="email" class="form-control" id="emp-email" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Position</label>
              <input type="text" class="form-control" id="emp-position" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Department</label>
              <select class="form-select" id="emp-dept" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Hire Date</label>
              <input type="date" class="form-control" id="emp-hire-date" required />
            </div>
          </div>
          <div class="mt-3">
            <button type="submit" class="btn btn-success me-2">Save</button>
            <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API   = 'http://localhost:3000/api';
    const token = sessionStorage.getItem('auth_token');
    const user  = JSON.parse(sessionStorage.getItem('auth_user') || 'null');
    if (!user || user.role !== 'admin') window.location.href = 'login.html';

    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

    async function loadEmployees() {
      const [empRes, deptRes] = await Promise.all([
        fetch(`${API}/employees`, { headers }),
        fetch(`${API}/departments`, { headers })
      ]);
      const employees   = await empRes.json();
      const departments = await deptRes.json();

      const rows = employees.length
        ? employees.map(e => {
            const dept = departments.find(d => d.id === e.deptId);
            return `<tr>
              <td>${e.employeeId}</td><td>${e.email}</td><td>${e.position}</td>
              <td>${dept ? dept.name : '—'}</td><td>${e.hireDate}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-1" onclick='editEmployee(${JSON.stringify(e)})'>Edit</button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteEmployee('${e.employeeId}')">Delete</button>
              </td>
            </tr>`;
          }).join('')
        : '<tr><td colspan="6" class="text-center text-muted">No employees yet.</td></tr>';

      document.getElementById('employees-table').innerHTML = `
        <table class="table table-bordered table-hover">
          <thead class="table-dark">
            <tr><th>ID</th><th>Email</th><th>Position</th><th>Department</th><th>Hire Date</th><th>Actions</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function loadDepts() {
      const res   = await fetch(`${API}/departments`, { headers });
      const depts = await res.json();
      document.getElementById('emp-dept').innerHTML =
        depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    }

    document.getElementById('add-employee-btn').addEventListener('click', async () => {
      document.getElementById('emp-edit-id').value = '';
      document.getElementById('form-title').textContent = 'Add Employee';
      document.getElementById('employee-form').reset();
      await loadDepts();
      document.getElementById('employee-form-container').classList.remove('d-none');
    });

    document.getElementById('cancel-btn').addEventListener('click', () => {
      document.getElementById('employee-form-container').classList.add('d-none');
    });

    document.getElementById('employee-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const editId     = document.getElementById('emp-edit-id').value;
      const employeeId = document.getElementById('emp-id').value.trim();
      const email      = document.getElementById('emp-email').value.trim();
      const position   = document.getElementById('emp-position').value.trim();
      const deptId     = document.getElementById('emp-dept').value;
      const hireDate   = document.getElementById('emp-hire-date').value;
      const body       = JSON.stringify({ employeeId, email, position, deptId, hireDate });
      const url        = editId ? `${API}/employees/${editId}` : `${API}/employees`;
      const method     = editId ? 'PUT' : 'POST';
      const res        = await fetch(url, { method, headers, body });
      if (res.ok) { this.reset(); document.getElementById('employee-form-container').classList.add('d-none'); loadEmployees(); }
    });

    async function editEmployee(emp) {
      document.getElementById('emp-edit-id').value   = emp.employeeId;
      document.getElementById('form-title').textContent = 'Edit Employee';
      document.getElementById('emp-id').value        = emp.employeeId;
      document.getElementById('emp-email').value     = emp.email;
      document.getElementById('emp-position').value  = emp.position;
      document.getElementById('emp-hire-date').value = emp.hireDate;
      await loadDepts();
      document.getElementById('emp-dept').value = emp.deptId;
      document.getElementById('employee-form-container').classList.remove('d-none');
    }

    async function deleteEmployee(id) {
      if (!confirm('Delete this employee?')) return;
      await fetch(`${API}/employees/${id}`, { method: 'DELETE', headers });
      loadEmployees();
    }

    loadEmployees();
  </script>
</body>
</html>
