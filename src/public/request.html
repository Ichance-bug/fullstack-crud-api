<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Requests</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="userDashboard.html">← User Dashboard</a>
    </div>
  </nav>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>My Requests</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#requestModal">+ New Request</button>
    </div>
    <div id="requests-table"></div>
  </main>

  <!-- New Request Modal -->
  <div class="modal fade" id="requestModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">New Request</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Type</label>
            <select class="form-select" id="req-type">
              <option value="Equipment">Equipment</option>
              <option value="Leave">Leave</option>
              <option value="Resources">Resources</option>
            </select>
          </div>
          <label class="form-label">Items</label>
          <div id="req-items"></div>
          <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="add-item-btn">+ Add Item</button>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="submit-request-btn">Submit</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API   = 'http://localhost:3000/api';
    const token = sessionStorage.getItem('auth_token');
    const user  = JSON.parse(sessionStorage.getItem('auth_user') || 'null');
    if (!user) window.location.href = 'login.html';

    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

    async function loadRequests() {
      const res      = await fetch(`${API}/requests`, { headers });
      const requests = await res.json();
      const badge    = s => ({ Pending: 'warning', Approved: 'success', Rejected: 'danger' }[s] || 'secondary');

      const rows = requests.length
        ? requests.map(r => `<tr>
            <td>${r.date}</td><td>${r.type}</td>
            <td>${r.items.map(i => `${i.name} (x${i.qty})`).join(', ')}</td>
            <td><span class="badge bg-${badge(r.status)}">${r.status}</span></td>
          </tr>`).join('')
        : '<tr><td colspan="4" class="text-center text-muted">No requests yet.</td></tr>';

      document.getElementById('requests-table').innerHTML = `
        <table class="table table-bordered table-hover">
          <thead class="table-dark"><tr><th>Date</th><th>Type</th><th>Items</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function addItemRow() {
      const div = document.createElement('div');
      div.className = 'input-group mb-2 req-item-row';
      div.innerHTML = `
        <input type="text" class="form-control item-name" placeholder="Item name" required />
        <input type="number" class="form-control item-qty" placeholder="Qty" min="1" value="1" style="max-width:80px" required />
        <button type="button" class="btn btn-outline-danger" onclick="this.closest('.req-item-row').remove()">×</button>`;
      document.getElementById('req-items').appendChild(div);
    }

    document.getElementById('add-item-btn').addEventListener('click', addItemRow);

    document.getElementById('requestModal').addEventListener('show.bs.modal', () => {
      document.getElementById('req-items').innerHTML = '';
      addItemRow();
    });

    document.getElementById('submit-request-btn').addEventListener('click', async () => {
      const type  = document.getElementById('req-type').value;
      const rows  = document.querySelectorAll('.req-item-row');
      const items = [];
      rows.forEach(row => {
        const name = row.querySelector('.item-name').value.trim();
        const qty  = parseInt(row.querySelector('.item-qty').value);
        if (name && qty) items.push({ name, qty });
      });
      if (!items.length) return alert('Add at least one item.');
      const res = await fetch(`${API}/requests`, {
        method: 'POST', headers, body: JSON.stringify({ type, items })
      });
      if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('requestModal')).hide();
        loadRequests();
      }
    });

    loadRequests();
  </script>
</body>
</html>
