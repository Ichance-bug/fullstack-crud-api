<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="adminDashboard.html">← Admin Dashboard</a>
    </div>
  </nav>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Accounts</h2>
      <button class="btn btn-primary" id="add-account-btn">+ Add Account</button>
    </div>
    <div id="accounts-table"></div>

    <div id="account-form-container" class="card mt-4 d-none">
      <div class="card-body">
        <h5 id="form-title">Add Account</h5>
        <form id="account-form">
          <input type="hidden" id="acc-edit-id" />
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" id="acc-firstname" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" id="acc-lastname" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="acc-email" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="acc-password" minlength="6" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Role</label>
              <select class="form-select" id="acc-role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="col-md-6 d-flex align-items-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="acc-verified" />
                <label class="form-check-label" for="acc-verified">Verified</label>
              </div>
            </div>
          </div>
          <div class="mt-3">
            <button type="submit" class="btn btn-success me-2">Save</button>
            <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API   = 'http://localhost:3000/api';
    const token = sessionStorage.getItem('auth_token');
    const user  = JSON.parse(sessionStorage.getItem('auth_user') || 'null');
    if (!user || user.role !== 'admin') window.location.href = 'login.html';

    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

    async function loadAccounts() {
      const res      = await fetch(`${API}/admin/accounts`, { headers });
      const accounts = await res.json();
      const rows = accounts.map(a => `<tr>
        <td>${a.firstName} ${a.lastName}</td>
        <td>${a.email}</td>
        <td><span class="badge bg-${a.role === 'admin' ? 'danger' : 'primary'}">${a.role}</span></td>
        <td>${a.isVerified ? '✅' : '—'}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-1" onclick='editAccount(${JSON.stringify(a)})'>Edit</button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteAccount('${a.id}')">Delete</button>
        </td>
      </tr>`).join('');
      document.getElementById('accounts-table').innerHTML = `
        <table class="table table-bordered table-hover">
          <thead class="table-dark"><tr><th>Name</th><th>Email</th><th>Role</th><th>Verified</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    document.getElementById('add-account-btn').addEventListener('click', () => {
      document.getElementById('acc-edit-id').value = '';
      document.getElementById('form-title').textContent = 'Add Account';
      document.getElementById('account-form').reset();
      document.getElementById('acc-password').required = true;
      document.getElementById('account-form-container').classList.remove('d-none');
    });

    document.getElementById('cancel-btn').addEventListener('click', () => {
      document.getElementById('account-form-container').classList.add('d-none');
    });

    document.getElementById('account-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const id         = document.getElementById('acc-edit-id').value;
      const firstName  = document.getElementById('acc-firstname').value.trim();
      const lastName   = document.getElementById('acc-lastname').value.trim();
      const email      = document.getElementById('acc-email').value.trim();
      const password   = document.getElementById('acc-password').value;
      const role       = document.getElementById('acc-role').value;
      const isVerified = document.getElementById('acc-verified').checked;
      const body       = id
        ? JSON.stringify({ firstName, lastName, email, role, isVerified, ...(password && { password }) })
        : JSON.stringify({ firstName, lastName, email, password, role, isVerified });
      const url    = id ? `${API}/admin/accounts/${id}` : `${API}/admin/accounts`;
      const method = id ? 'PUT' : 'POST';
      const res    = await fetch(url, { method, headers, body });
      if (res.ok) { this.reset(); document.getElementById('account-form-container').classList.add('d-none'); loadAccounts(); }
    });

    function editAccount(acc) {
      document.getElementById('acc-edit-id').value    = acc.id;
      document.getElementById('form-title').textContent = 'Edit Account';
      document.getElementById('acc-firstname').value  = acc.firstName;
      document.getElementById('acc-lastname').value   = acc.lastName;
      document.getElementById('acc-email').value      = acc.email;
      document.getElementById('acc-password').value   = '';
      document.getElementById('acc-password').required = false;
      document.getElementById('acc-role').value       = acc.role;
      document.getElementById('acc-verified').checked = acc.isVerified;
      document.getElementById('account-form-container').classList.remove('d-none');
    }

    async function deleteAccount(id) {
      if (!confirm('Delete this account?')) return;
      await fetch(`${API}/admin/accounts/${id}`, { method: 'DELETE', headers });
      loadAccounts();
    }

    loadAccounts();
  </script>
</body>
</html>
