<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Requests</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="adminDashboard.html">← Admin Dashboard</a>
    </div>
  </nav>

  <main class="container my-4">
    <h2 class="mb-3">All Requests</h2>
    <div id="requests-table"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API   = 'http://localhost:3000/api';
    const token = sessionStorage.getItem('auth_token');
    const user  = JSON.parse(sessionStorage.getItem('auth_user') || 'null');
    if (!user || user.role !== 'admin') window.location.href = 'login.html';

    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

    async function loadAllRequests() {
      const res      = await fetch(`${API}/requests/all`, { headers });
      const requests = await res.json();
      const badge    = s => ({ Pending: 'warning', Approved: 'success', Rejected: 'danger' }[s] || 'secondary');

      const rows = requests.length
        ? requests.map(r => `<tr>
            <td>${r.date}</td>
            <td>${r.employeeEmail}</td>
            <td>${r.type}</td>
            <td>${r.items.map(i => `${i.name} (x${i.qty})`).join(', ')}</td>
            <td><span class="badge bg-${badge(r.status)}">${r.status}</span></td>
            <td>
              <button class="btn btn-sm btn-success me-1" onclick="updateStatus('${r.id}', 'Approved')">Approve</button>
              <button class="btn btn-sm btn-danger" onclick="updateStatus('${r.id}', 'Rejected')">Reject</button>
            </td>
          </tr>`).join('')
        : '<tr><td colspan="6" class="text-center text-muted">No requests.</td></tr>';

      document.getElementById('requests-table').innerHTML = `
        <table class="table table-bordered table-hover">
          <thead class="table-dark">
            <tr><th>Date</th><th>User</th><th>Type</th><th>Items</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function updateStatus(id, status) {
      await fetch(`${API}/requests/${id}/status`, {
        method: 'PUT', headers, body: JSON.stringify({ status })
      });
      loadAllRequests();
    }

    loadAllRequests();
  </script>
</body>
</html>
