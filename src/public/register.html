<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4" style="width:100%;max-width:420px">
      <h2 class="mb-4">Register</h2>
      <form id="register-form" novalidate>
        <div class="mb-3">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" id="reg-firstname" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" id="reg-lastname" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="reg-email" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="reg-password" minlength="6" required />
          <div class="form-text">Minimum 6 characters.</div>
        </div>
        <div id="reg-error" class="alert alert-danger d-none"></div>
        <div id="reg-success" class="alert alert-success d-none"></div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
        <p class="mt-3 text-center">Already have an account? <a href="login.html">Login</a></p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API = 'http://localhost:3000/api';

    document.getElementById('register-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const firstName = document.getElementById('reg-firstname').value.trim();
      const lastName  = document.getElementById('reg-lastname').value.trim();
      const email     = document.getElementById('reg-email').value.trim();
      const password  = document.getElementById('reg-password').value;
      const errEl     = document.getElementById('reg-error');
      const sucEl     = document.getElementById('reg-success');
      try {
        const res  = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        sucEl.textContent = 'Registered! Check your email to verify. (Use /api/verify for now)';
        sucEl.classList.remove('d-none');
        errEl.classList.add('d-none');
        this.reset();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('d-none');
        sucEl.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
